apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  serviceAccountName: helm-controller
  targetNamespace: falco
  chart:
    spec:
      chart: falco
      version: 6.2.2
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: falco
  interval: 1m
  timeout: 15m
  values:
    driver:
      kind: modern_ebpf
      modern_ebpf:
        leastPrivileged: true
    metrics:
      enabled: true
    collectors:
      kubernetes:
        enabled: true # Experimental
    grafana:
      dashboards:
        enabled: true
    webserver:
      prometheus_metrics_enabled: true
    program_output:
        enabled: true
        program: ${flux_quote}${flux_falco_program_output_program}${flux_quote}
    falcosidekick:
      enabled: true
      priorityClassName: cluster-observability
      config:
        slack:
          webhookurl: ${flux_quote}${flux_falco_sidekick_slack_alert_webhookurl}${flux_quote}
          channel: ${flux_quote}${flux_falco_sidekick_slack_alert_channel}${flux_quote}
          minimumpriority: "critical"
      resources:
        requests:
          cpu: 5m
          memory: 256Mi
        limits:
          memory: 256Mi
      webui:
        enabled: true
        priorityClassName: cluster-observability
        redis:
          priorityClassName: cluster-observability
    resources:
      requests:
        cpu: 25m
        memory: 1024Mi
      limits:
        cpu: null
        memory: 1024Mi
    controller:
      daemonset:
        updateStrategy:
          rollingUpdate:
            maxUnavailable: 25%
    podPriorityClassName: node-observability
