apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  serviceAccountName: helm-controller
  targetNamespace: falco
  chart:
    spec:
      chart: falco
      version: 8.0.5
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: falco
  interval: 1m
  timeout: 15m
  values:
    driver:
      kind: modern_ebpf
      modern_ebpf:
        leastPrivileged: true
    metrics:
      enabled: true
    collectors:
      kubernetes:
        enabled: true # experimental
    k8s-metacollector: # enabled by collectors.kubernetes.enabled
      resources:
        requests:
          cpu: 5m
          memory: 256Mi
        limits:
          memory: 256Mi
    grafana:
      dashboards:
        enabled: true
    webserver:
      prometheus_metrics_enabled: true
    falcosidekick:
      enabled: true
      priorityClassName: cluster-observability
      config:
        slack:
          webhookurl: "${flux_falco_sidekick_slack_alert_webhookurl}"
          minimumpriority: "critical"
      resources:
        requests:
          cpu: 5m
          memory: 256Mi
        limits:
          memory: 256Mi
      webui:
        enabled: false # disabled because it has problems with Redis being used as a backend
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 512Mi
    controller:
      daemonset:
        updateStrategy:
          rollingUpdate:
            maxUnavailable: 25%
    podPriorityClassName: node-observability
