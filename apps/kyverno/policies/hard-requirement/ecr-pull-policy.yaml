apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ecr-pull-compliance
  annotations:
    policies.kyverno.io/title: ECR Pull Policy Compliance Check
    policies.kyverno.io/category: Requirement
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Validates that container images from org-owned ECR repositories have
      compliant pull policies that allow cross-account access within the
      AWS Organization.
spec:
  background: true
  emitWarning: true

  # Fail-open at the webhook level: if Kyverno (or its webhook) is
  # unreachable or times out, allow the request rather than block it.
  webhookConfiguration:
    failurePolicy: Ignore
    timeoutSeconds: 10

  rules:
    # ------------------------------------------------------------------
    # Rule A: enforce compliance for images the service successfully
    # evaluated. Currently Audit (warn only). Flip failureAction to
    # Enforce to start blocking non-compliant images. On a service error
    # the apiCall default sets allowed=true, so this rule fails open
    # silently (the warning is emitted by Rule B instead).
    # ------------------------------------------------------------------
    - name: check-ecr-image-compliance
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE

      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno

      validate:
        failureAction: Audit
        message: >-
          One or more container images reference an ECR repository that does
          not have a compliant pull policy. Visit https://wiki.dfds.cloud/en/playbooks/requirements/ECR 
          for more information.

        foreach:

          # Standard containers
          - list: "request.object.spec.containers"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  # Fail-open: if the service errors, treat the image as allowed.
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.allowed }}"
                    operator: Equals
                    value: false

          # Init containers
          - list: "request.object.spec.initContainers || `[]`"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  # Fail-open: if the service errors, treat the image as allowed.
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.allowed }}"
                    operator: Equals
                    value: false

          # Ephemeral containers
          - list: "request.object.spec.ephemeralContainers || `[]`"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  # Fail-open: if the service errors, treat the image as allowed.
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.allowed }}"
                    operator: Equals
                    value: false

    # ------------------------------------------------------------------
    # Rule B: warn (never block) when the compliance service could not be
    # reached. Detected via the sentinel reason set by the apiCall default.
    # Kept on Audit permanently so a service outage only surfaces a
    # warning while images are still admitted (fail-open).
    # ------------------------------------------------------------------
    - name: warn-ecr-check-unavailable
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
                - UPDATE

      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno

      validate:
        failureAction: Audit
        message: >-
          The ECR pull compliance service was unavailable; one or more
          container images were admitted without verification. See
          https://wiki.dfds.cloud/en/playbooks/requirements/ECR

        foreach:

          # Standard containers
          - list: "request.object.spec.containers"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.reason }}"
                    operator: Equals
                    value: check_unavailable

          # Init containers
          - list: "request.object.spec.initContainers || `[]`"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.reason }}"
                    operator: Equals
                    value: check_unavailable

          # Ephemeral containers
          - list: "request.object.spec.ephemeralContainers || `[]`"
            context:
              - name: complianceCheck
                apiCall:
                  method: POST
                  data:
                    - key: image
                      value: "{{ element.image }}"
                  service:
                    url: http://platform-requirements-ecr-pull-compliance-exporter.ssu-mgmt-dznts.svc.cluster.local:8080/api/v1/compliance/check
                    headers:
                      - key: Content-Type
                        value: application/json
                  default:
                    allowed: true
                    reason: check_unavailable
            deny:
              conditions:
                all:
                  - key: "{{ complianceCheck.reason }}"
                    operator: Equals
                    value: check_unavailable
