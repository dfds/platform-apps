---
# Source: k8s-monitoring/templates/alloy-events-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-k8s-monitoring-alloy-events
  namespace: grafana
data:
  config.alloy: |-
    // Cluster Events
    loki.source.kubernetes_events "cluster_events" {
      job_name   = "integrations/kubernetes/eventhandler"
      log_format = "logfmt"
      forward_to = [
        loki.process.cluster_events.receiver,
      ]
    }

    loki.process "cluster_events" {
      forward_to = [
        loki.process.logs_service.receiver,
      ]
    }

    // Logs Service
    remote.kubernetes.secret "logs_service" {
      name = "alloy-secret"
      namespace = "grafana"
    }

    loki.process "logs_service" {
      stage.static_labels {
          values = {
            cluster = "${flux_cluster_name}",
          }
      }
      forward_to = [loki.write.logs_service.receiver]
    }

    // Loki
    loki.write "logs_service" {
      endpoint {
        url = convert.nonsensitive(remote.kubernetes.secret.logs_service.data["loki_hostname"]) + "/loki/api/v1/push"
        tenant_id = convert.nonsensitive(remote.kubernetes.secret.logs_service.data["tenantId"])

        basic_auth {
          username = convert.nonsensitive(remote.kubernetes.secret.logs_service.data["loki_username"])
          password = remote.kubernetes.secret.logs_service.data["password"]
        }
      }
    }


    logging {
      level  = "info"
      format = "logfmt"
    }
