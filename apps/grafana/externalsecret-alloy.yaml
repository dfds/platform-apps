apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alloy-secret
  namespace: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: grafana-1password
  target:
    name: alloy-secret
    creationPolicy: Owner
  data:
    - secretKey: prom_hostname
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Prometheus_URL
    - secretKey: prom_username
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Prometheus_Username
    - secretKey: loki_hostname
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Loki_URL
    - secretKey: loki_username
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Loki_Username
    - secretKey: tempo_hostname
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Tempo_URL
    - secretKey: tempo_username
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: Tempo_Username
    - secretKey: password
      remoteRef:
        key: Grafana.com - ${flux_grafana_stack}
        property: grafana_token