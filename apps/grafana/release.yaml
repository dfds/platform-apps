apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana
spec:
  serviceAccountName: helm-controller
  releaseName: grafana-k8s-monitoring
  chart:
    spec:
      chart: k8s-monitoring
      version: 1.6.51
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  interval: 1m0s
  install:
    remediation:
      retries: 3
  values:
    alloy:
      alloy:
        clustering:
          enabled: true
        mounts:
          extra:
          - mountPath: /var/lib/agent
            name: agent-wal
        resources:
          limits:
            memory: 4Gi
          requests:
            memory: 4Gi
        storagePath: /var/lib/agent
      controller:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                - key: dedicated
                  operator: In
                  values:
                  - observability
              weight: 1
        priorityClassName: cluster-observability
        replicas: 2
        tolerations:
        - effect: NoSchedule
          key: observability.dfds
          operator: Exists
        volumeClaimTemplates:
        - metadata:
            name: agent-wal
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
            storageClassName: csi-gp3
    alloy-events:
      controller:
        priorityClassName: cluster-observability
    alloy-logs:
      controller:
        priorityClassName: node-observability
      updateStrategy:
        rollingUpdate:
          maxUnavailable: 25%
        type: RollingUpdate
    cluster:
      name: cargo
    externalServices:
      loki:
        basicAuth:
          passwordKey: password
          usernameKey: loki_username
        hostKey: loki_hostname
        secret:
          create: false
          name: alloy-secret
          namespace: grafana
      prometheus:
        basicAuth:
          passwordKey: password
          usernameKey: prom_username
        hostKey: prom_hostname
        secret:
          create: false
          name: alloy-secret
          namespace: grafana
      tempo:
        basicAuth:
          passwordKey: password
          usernameKey: tempo_username
        hostKey: tempo_hostname
        secret:
          create: false
          name: alloy-secret
          namespace: grafana
    extraObjects:
    - apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        labels:
          app: prometheus-service-metrics-scraper
        name: prometheus-service-metrics-scraper
      spec:
        endpoints:
        - path: /metrics
          port: metrics
          scrapeTimeout: 120s
        - path: /metrics
          port: admin
        - path: /metrics
          port: http
        namespaceSelector:
          any: true
        selector:
          matchLabels:
            scrape-service-metrics: "true"
    kube-state-metrics:
      customLabels:
        jobLabel: kube-state-metrics
      enabled: true
      priorityClassName: cluster-observability
      rbac:
        create: true
        extraRules:
        - apiGroups:
          - traefik.io
          resources:
          - ingressroutes
          - middlewares
          - tlsoptions
          verbs:
          - list
          - watch
      resources:
        requests:
          cpu: 20m
          memory: 100Mi
    logs:
      cluster_events:
        enabled: true
      enabled: true
      extraConfig: |
        local.file_match "worker_nodes_logs" {
          path_targets = [{
            __address__ = "localhost",
            __path__    = "/var/log/**",
            __path_exclude__ = "/var/log/{pods,containers,journal}/**",
            instance = env("HOSTNAME"),
            job         = "integrations/kubernetes/worker-node",
          }]
        }

        loki.source.file "worker_nodes_logs" {
          targets    = local.file_match.worker_nodes_logs.targets
          forward_to = [loki.process.worker_nodes_logs.receiver]
        }

        loki.process "worker_nodes_logs" {
          forward_to = [
            loki.process.logs_service.receiver,
          ]
        }
      journal:
        enabled: true
        units: []
      pod_logs:
        enabled: true
    metrics:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: dedicated
                operator: In
                values:
                - observability
            weight: 1
      apiserver:
        enabled: false
      autoDiscover:
        enabled: false
      cadvisor:
        metricsTuning:
          useDefaultAllowList: true
      cost:
        enabled: false
      enabled: true
      kube-state-metrics:
        extraMetricRelabelingRules: |-
          rule {
            regex = "uid"
            action = "drop"
          }
        metricsTuning:
          excludeMetrics:
          - kube_replicaset_status_ready_replicas
          - kube_replicaset_created
          - kube_replicaset_metadata_generation
          - kube_replicaset_spec_replicas
          - kube_replicaset_status_fully_labeled_replicas
          - kube_replicaset_status_observed_generation
          - kube_replicaset_status_replicas
          - kube_pod_start_time
          includeMetrics:
          - kube_deployment_status_replicas_unavailable
          - kube_pod_deletion_timestamp
          useDefaultAllowList: true
      kubelet:
        enabled: true
        metricsTuning:
          includeMetrics:
          - storage_operation_duration_seconds_bucket
          - rest_client_request_duration_seconds_bucket
          - process_resident_memory_bytes
          - process_cpu_seconds_total
          - go_goroutines
          - kubelet_runtime_operations_duration_seconds_bucket
          useDefaultAllowList: true
      node-exporter:
        enabled: true
        metricsTuning:
          useDefaultAllowList: true
      scrapeInterval: 120s
      serviceMonitors:
        enabled: true
        selector: |-
          match_expression {
            key = "release"
            operator = "NotIn"
            values = ["monitoring"]
          }
      tolerations:
      - effect: NoSchedule
        key: observability.dfds
        operator: Exists
    opencost:
      enabled: false
    prometheus-node-exporter:
      enabled: true
      podLabels:
        jobLabel: node-exporter
      priorityClassName: node-observability
      resources:
        requests:
          cpu: 20m
          memory: 50Mi
      updateStrategy:
        rollingUpdate:
          maxUnavailable: 25%
        type: RollingUpdate
    prometheus-operator-crds:
      enabled: true
    traces:
      enabled: true

