---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  serviceAccountName: helm-controller
  releaseName: velero
  chart:
    spec:
      chart: velero
      version: 11.3.2
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  interval: 1m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    cleanUpCRDs: true
    configuration:
      backupStorageLocation:
      - bucket: ${flux_velero_aws_bucket_name}
        config:
          region: ${flux_aws_region}
        default: true
        name: default
        provider: aws
        accessMode: ${flux_velero_access_mode}
      - bucket: ${flux_velero_azure_bucket_name}
        config:
          resourceGroup: ${flux_velero_azure_resource_group}
          storageAccount: ${flux_velero_azure_storage_account}
          subscriptionId: ${flux_velero_azure_subscription_id}
        credential:
          key: cloud
          name: velero-credentials
        name: azure
        provider: azure
        accessMode: ${flux_velero_access_mode}
      features: EnableCSI
      logFormat: json
      volumeSnapshotLocation:
      - config:
          region: ${flux_aws_region}
        name: velero-snapshot
        provider: aws
      - bucket: ${flux_velero_azure_bucket_name}
        config:
          resourceGroup: ${flux_velero_azure_resource_group}
          subscriptionId: ${flux_velero_azure_subscription_id}
        credential:
          key: cloud
          name: velero-credentials
        name: azure-snapshot
        provider: azure
    credentials:
      useSecret: false
    deployNodeAgent: true
    nodeAgent:
      resources:
        requests:
          cpu: 5m
          memory: 384Mi
        limits:
          memory: 384Mi
    initContainers:
    - image: velero/velero-plugin-for-aws:v1.13.2
      name: velero-plugin-for-aws
      volumeMounts:
      - mountPath: /target
        name: plugins
    - image: velero/velero-plugin-for-microsoft-azure:v1.13.2
      name: velero-plugin-for-microsoft-azure
      volumeMounts:
      - mountPath: /target
        name: plugins
    metrics:
      scrapeInterval: 120s
      serviceMonitor:
        enabled: true
        metricRelabelings:
        - action: keep
          regex: velero_backup_validation_failure_total|velero_restore_failed_total|velero_restore_validation_failed_total|velero_volume_snapshot_failure_total
          sourceLabels:
          - __name__
    priorityClassName: cluster-infrastructure
    resources:
      limits:
        memory: 20Gi
      requests:
        cpu: 100m
        memory: 20Gi
    schedules:
      ${flux_cluster_name}-cluster-backup:
        schedule: 0 0 * * *
        template:
          excludedClusterScopedResources:
          - clustercleanuppolicies.kyverno.io
          - clusterpolicies.kyverno.io
          - globalcontextentries.kyverno.io
          - deletingpolicies.policies.kyverno.io
          - generatingpolicies.policies.kyverno.io
          - imagevalidatingpolicies.policies.kyverno.io
          - mutatingpolicies.policies.kyverno.io
          - validatingpolicies.policies.kyverno.io
          - clusterephemeralreports.reports.kyverno.io
          - clustercompliancereports.aquasecurity.github.io
          - clusterconfigauditreports.aquasecurity.github.io
          - clusterinfraassessmentreports.aquasecurity.github.io
          - clusterrbacassessmentreports.aquasecurity.github.io
          - clustersbomreports.aquasecurity.github.io
          - clustervulnerabilityreports.aquasecurity.github.io
          - clusterpolicyreports.wgpolicyk8s.io
          excludedNamespaceScopedResources:
          - secrets
          - cleanuppolicies.kyverno.io
          - policies.kyverno.io
          - policyexceptions.kyverno.io
          - updaterequests.kyverno.io
          - namespaceddeletingpolicies.policies.kyverno.io
          - namespacedgeneratingpolicies.policies.kyverno.io
          - namespacedimagevalidatingpolicies.policies.kyverno.io
          - namespacedmutatingpolicies.policies.kyverno.io
          - namespacedvalidatingpolicies.policies.kyverno.io
          - policyexceptions.policies.kyverno.io
          - ephemeralreports.reports.kyverno.io
          - configauditreports.aquasecurity.github.io
          - exposedsecretreports.aquasecurity.github.io
          - infraassessmentreports.aquasecurity.github.io
          - rbacassessmentreports.aquasecurity.github.io
          - sbomreports.aquasecurity.github.io
          - vulnerabilityreports.aquasecurity.github.io
          - policyreports.wgpolicyk8s.io
          excludedNamespaces:
          - velero
          - atlantis
          - kyverno
          snapshotVolumes: true
          storageLocation: default
          ttl: 730h
      ${flux_cluster_name}-cluster-backup-offsite:
        schedule: 0 * * * *
        template:
          excludedClusterScopedResources:
          - clustercleanuppolicies.kyverno.io
          - clusterpolicies.kyverno.io
          - globalcontextentries.kyverno.io
          - deletingpolicies.policies.kyverno.io
          - generatingpolicies.policies.kyverno.io
          - imagevalidatingpolicies.policies.kyverno.io
          - mutatingpolicies.policies.kyverno.io
          - validatingpolicies.policies.kyverno.io
          - clusterephemeralreports.reports.kyverno.io
          - clustercompliancereports.aquasecurity.github.io
          - clusterconfigauditreports.aquasecurity.github.io
          - clusterinfraassessmentreports.aquasecurity.github.io
          - clusterrbacassessmentreports.aquasecurity.github.io
          - clustersbomreports.aquasecurity.github.io
          - clustervulnerabilityreports.aquasecurity.github.io
          - clusterpolicyreports.wgpolicyk8s.io
          excludedNamespaceScopedResources:
          - secrets
          - cleanuppolicies.kyverno.io
          - policies.kyverno.io
          - policyexceptions.kyverno.io
          - updaterequests.kyverno.io
          - namespaceddeletingpolicies.policies.kyverno.io
          - namespacedgeneratingpolicies.policies.kyverno.io
          - namespacedimagevalidatingpolicies.policies.kyverno.io
          - namespacedmutatingpolicies.policies.kyverno.io
          - namespacedvalidatingpolicies.policies.kyverno.io
          - policyexceptions.policies.kyverno.io
          - ephemeralreports.reports.kyverno.io
          - configauditreports.aquasecurity.github.io
          - exposedsecretreports.aquasecurity.github.io
          - infraassessmentreports.aquasecurity.github.io
          - rbacassessmentreports.aquasecurity.github.io
          - sbomreports.aquasecurity.github.io
          - vulnerabilityreports.aquasecurity.github.io
          - policyreports.wgpolicyk8s.io
          excludedNamespaces:
          - velero
          - atlantis
          - kyverno
          snapshotMoveData: true
          snapshotVolumes: true
          storageLocation: azure
          ttl: 730h
          volumeSnapshotLocations:
          - azure-snapshot
    serviceAccount:
      server:
        annotations:
          eks.amazonaws.com/role-arn: ${flux_velero_iam_role_arn}
          eks.amazonaws.com/sts-regional-endpoints: "true"
        create: true
    snapshotsEnabled: true
